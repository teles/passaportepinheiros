name: Enrich experiences with Foursquare

on:
    workflow_dispatch:
        inputs:
            force:
                description: "Re-fetch all places (even already enriched)"
                type: boolean
                default: false
    schedule:
        # Run daily at 03:00 UTC (00:00 BRT)
        - cron: "0 3 * * *"

permissions:
    contents: write

jobs:
    enrich:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  # Use a token with write access so the commit push triggers deploy
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Run Foursquare enrichment
              run: |
                  FLAGS=""
                  if [ "${{ github.event.inputs.force }}" = "true" ]; then
                    FLAGS="--force"
                  fi
                  python3 foursquare_enrich.py $FLAGS
              env:
                  FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}

            - name: Commit and push if changed
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add src/content/experiencias/
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "chore(data): update Foursquare enrichment [skip ci]"
                    git push
                  fi
